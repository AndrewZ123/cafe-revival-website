  - generic [ref=f3e23]:
    - generic [ref=f3e24]:
      - generic [ref=f3e25]: Our Story
      - heading "It started with a simple thought." [level=2] [ref=f3e26]
      - paragraph [ref=f3e27]: "We kept noticing the same thing: the best conversations—the real ones—happened over coffee. Not in a meeting room, not in a church hall. At a small table with a warm cup in hand and nowhere to rush off to."
      - paragraph [ref=f3e28]: Coffee shops have a way of slowing people down. You sit. You talk. Things come up that might not otherwise. That kind of space felt worth building.
      - paragraph [ref=f3e29]: So we started dreaming about what it would look like to open a café where the coffee is actually good—not an afterthought—and where faith is part of the fabric, not something tacked on. A place you’d want to come to even if you weren’t “the church type.”
      - paragraph [ref=f3e30]: The café is the setting. Revival is the prayer.
      - link "Our Vision" [ref=f3e31] [cursor=pointer]:
        - /url: "#vision"
    - img "Two people laughing together over coffee at a small table" [ref=f3e34]
  - generic [ref=f3e36]:
    - generic [ref=f3e37]:
      - generic [ref=f3e38]: Our Vision
      - heading "More than a coffee shop." [level=2] [ref=f3e39]
      - paragraph [ref=f3e40]: We’re dreaming of a place where faith and everyday life don’t feel like separate things. A hub for connection, ministry, and community.
    - generic [ref=f3e41]:
      - generic [ref=f3e42]:
        - heading "Christ-Centered Gathering Place" [level=3] [ref=f3e48]
        - paragraph [ref=f3e49]: Bible studies, worship nights, prayer groups—happening throughout the week. Not because we have to, but because these are the things that shape us.
      - generic [ref=f3e50]:
        - heading "Rooted in the Neighborhood" [level=3] [ref=f3e57]
        - paragraph [ref=f3e58]: Food distributions, recovery groups, community meals, thrift outreach. We want to be the kind of place that actually serves the people around it.
      - generic [ref=f3e59]:
        - heading "Humble & Dependent" [level=3] [ref=f3e63]
        - paragraph [ref=f3e64]: Revival can’t be manufactured. It’s not about a program or a strategy. We’re simply making space and trusting God to do what only He can.
  - generic [ref=f3e66]:
    - generic [ref=f3e67]:
      - generic [ref=f3e68]: What Makes Us Different
      - heading "Good coffee matters. So does why you’re here." [level=2] [ref=f3e69]
      - paragraph [ref=f3e70]: We don’t think you should have to choose between quality and purpose.
    - generic [ref=f3e71]:
      - generic [ref=f3e72]:
        - heading "Really Good Coffee" [level=3] [ref=f3e77]
        - paragraph [ref=f3e78]: We’re not using coffee as a gimmick. We genuinely care about what’s in your cup. Quality matters—because what we make reflects what we believe.
      - generic [ref=f3e79]:
        - heading "Real Community" [level=3] [ref=f3e83]
        - paragraph [ref=f3e84]: No performance. No hidden expectations. Just people being people—showing up, having honest conversations, and looking out for each other.
      - generic [ref=f3e85]:
        - heading "Faith Without Pressure" [level=3] [ref=f3e90]
        - paragraph [ref=f3e91]: Jesus is at the center of who we are. But you won’t be sold to or guilted. You’re welcome here whether you’re a believer, a doubter, or just curious.
  - generic [ref=f3e92]:
    - text: "\""
    - generic [ref=f3e94]:
      - generic [ref=f3e95]: Our Mission
      - heading "Why we exist" [level=2] [ref=f3e96]
      - paragraph [ref=f3e97]: To glorify God by creating a welcoming community café where authentic relationships provide opportunities to share the hope of Jesus, strengthen those who follow Him, and serve our neighbors with genuine hospitality.
      - paragraph [ref=f3e98]: — Rooted in faith. Grounded in love. Open to all.
