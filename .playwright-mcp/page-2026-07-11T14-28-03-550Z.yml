  - generic [ref=f3e100]:
    - generic [ref=f3e101]:
      - generic [ref=f3e102]: A Place to Gather
      - heading "Community life at Café Revival" [level=2] [ref=f3e103]
      - paragraph [ref=f3e104]: The café stays open, but the tables get rearranged. Here are some of the ways the space comes alive throughout the week.
    - generic [ref=f3e105]:
      - generic [ref=f3e106]:
        - heading "Bible Studies" [level=3] [ref=f3e111]
        - paragraph [ref=f3e112]: Small groups gathering around Scripture. No pressure to have it all figured out. Just people reading, asking questions, and learning together.
      - generic [ref=f3e113]:
        - heading "Worship Nights" [level=3] [ref=f3e117]
        - paragraph [ref=f3e118]: Simple evenings of music, silence, and prayer. A chance to slow down and let the weight of the week fall off for a while.
      - generic [ref=f3e119]:
        - heading "Prayer Gatherings" [level=3] [ref=f3e123]
        - paragraph [ref=f3e124]: Lifting up our neighbors, our city, and one another. No formula. No performance. Just honest conversation with God.
      - generic [ref=f3e125]:
        - heading "Recovery Support" [level=3] [ref=f3e132]
        - paragraph [ref=f3e133]: Confidential spaces for people navigating recovery. Everyone deserves a place to heal without judgment.
      - generic [ref=f3e134]:
        - heading "Community Meals" [level=3] [ref=f3e139]
        - paragraph [ref=f3e140]: Regular shared dinners where anyone can pull up a chair. Breaking bread together has a way of turning strangers into friends.
      - generic [ref=f3e141]:
        - heading "Food Pantry" [level=3] [ref=f3e146]
        - paragraph [ref=f3e147]: Practical help for neighbors in need. No paperwork. No questions. Just food and a warm welcome.
  - generic [ref=f3e150]:
    - generic [ref=f3e151]:
      - generic [ref=f3e152]: Why Café Revival
      - heading "The café is the setting. Revival is the prayer." [level=2] [ref=f3e153]
      - paragraph [ref=f3e154]: Café Revival isn’t the point. It’s a starting point. We hope—humbly—that God might use this space to strengthen churches, launch new ministries, restore families, and bring hope to people who feel far from Him.
      - paragraph [ref=f3e155]: We dream of a place where the line between “sacred” and “everyday” blurs. Where conversations over coffee lead to changed lives. Where the presence of Jesus feels as natural as the smell of fresh espresso.
      - generic [ref=f3e156]: “Unless the Lord builds the house, those who build it labor in vain.” — Psalm 127:1
      - paragraph [ref=f3e157]: We show up. We brew good coffee. We love our neighbors. And we trust God with the rest.
    - generic [ref=f3e158]: Revival
