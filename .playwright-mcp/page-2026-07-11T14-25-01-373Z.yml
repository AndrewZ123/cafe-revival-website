      - generic [ref=e27]: Our Story
      - heading "A place to gather. A place to belong." [level=2] [ref=e28]: A place to gather.A place to belong.
      - paragraph [ref=e29]: In a world that moves faster every day, we sensed a deep need for places where people can slow down, connect, and feel genuinely welcomed. Coffee shops have become modern-day gathering places — where friendships begin, conversations deepen, and community takes root.
      - paragraph [ref=e30]: "Café Revival was born from a recurring sense of calling: to create a Christian coffee shop that ministers through everyday presence, not just from a stage. A space where baristas know your name, where conversations drift toward what matters most, and where the hope of Jesus is shared naturally — over a perfectly crafted latte."
      - paragraph [ref=e31]: The café is the setting. Revival is the prayer.
      - link "Our Vision" [ref=e32] [cursor=pointer]:
        - /url: "#vision"
    - img "Photo of people talking over coffee in a warm café setting" [ref=e33]:
      - generic [ref=e34]: 📷 photo of people connecting over coffee
  - generic [ref=e36]:
