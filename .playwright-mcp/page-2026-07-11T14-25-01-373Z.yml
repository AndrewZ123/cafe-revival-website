  - generic [ref=e150]:
    - generic [ref=e151]:
      - generic [ref=e152]: Why Café Revival
      - heading "The café is the setting. Revival is the prayer." [level=2] [ref=e153]: The café is the setting.Revival is the prayer.
      - paragraph [ref=e154]: Café Revival is not an end in itself — it's a beginning. We humbly hope that God might use this space to strengthen churches, launch new ministries, restore families, and bring hope to those who feel far from Him.
      - paragraph [ref=e155]: We dream of a place where the line between "sacred" and "everyday" fades away — where conversations over coffee lead to changed lives, and where the presence of Jesus is felt as naturally as the aroma of fresh espresso.
      - generic [ref=e156]: "\"Unless the Lord builds the house, those who build it labor in vain.\" — Psalm 127:1"
      - paragraph [ref=e157]: We build in faith, trusting God to do what only He can do. Our part is simply to show up, brew excellent coffee, love our neighbors, and point everything back to Him.
