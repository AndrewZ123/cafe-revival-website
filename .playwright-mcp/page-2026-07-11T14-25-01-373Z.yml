      - generic [ref=e38]: Our Vision
      - heading "More than a coffee shop" [level=2] [ref=e39]
      - paragraph [ref=e40]: We dream of a place where faith and everyday life intersect — a hub for ministry, connection, and community transformation.
    - generic [ref=e41]:
      - generic [ref=e42]:
        - heading "Christ-Centered Gathering Place" [level=3] [ref=e48]
        - paragraph [ref=e49]: A welcoming home for Bible studies, worship nights, prayer gatherings, and discipleship groups — active throughout the week, not just on Sundays.
      - generic [ref=e50]:
        - heading "Authentic Community Life" [level=3] [ref=e57]
        - paragraph [ref=e58]: Recovery ministries, food pantry distributions, thrift outreach events, and community meals — serving our neighbors in tangible, practical ways.
      - generic [ref=e59]:
        - heading "Dependent on God" [level=3] [ref=e63]
        - paragraph [ref=e64]: Revival is God's work — not ours. Café Revival is simply a faithful space where hearts can be awakened, lives restored, and the Gospel proclaimed with humility and joy.
  - generic [ref=e66]:
    - generic [ref=e67]:
      - generic [ref=e68]: What Makes Us Different
      - heading "Excellent coffee. Authentic community. Faithful witness." [level=2] [ref=e69]: Excellent coffee. Authentic community.Faithful witness.
      - paragraph [ref=e70]: We believe you shouldn't have to choose between quality and purpose.
    - generic [ref=e71]:
      - generic [ref=e72]:
        - heading "Excellent Coffee" [level=3] [ref=e77]
        - paragraph [ref=e78]: We are committed to serving exceptional coffee in an inviting atmosphere that people genuinely enjoy. Quality and craft matter — because excellence honors God and blesses our guests.
      - generic [ref=e79]:
        - heading "Authentic Community" [level=3] [ref=e83]
        - paragraph [ref=e84]: Prayer, conversation, encouragement, and discipleship are part of the natural rhythm of the café. We're not just serving drinks — we're building a family.
      - generic [ref=e85]:
        - heading "Faithful Gospel Witness" [level=3] [ref=e90]
        - paragraph [ref=e91]: We desire to love people well, serve with excellence, and openly share the hope found in Jesus — without pressure, always in grace. You are welcome here, exactly as you are.
