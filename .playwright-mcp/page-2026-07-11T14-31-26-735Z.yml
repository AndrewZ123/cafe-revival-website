  - generic [ref=f4e98]:
    - generic [ref=f4e99]:
      - generic [ref=f4e100]: A Place to Gather
      - heading "Community life at Café Revival" [level=2] [ref=f4e101]
      - paragraph [ref=f4e102]: The café stays open, but the tables get rearranged. Here are some of the ways the space comes alive throughout the week.
    - generic [ref=f4e103]:
      - generic [ref=f4e104]:
        - heading "Bible Studies" [level=3] [ref=f4e109]
        - paragraph [ref=f4e110]: Small groups gathering around Scripture. Some have studied it for decades. Some are opening it for the first time. Everyone’s welcome at the table.
      - generic [ref=f4e111]:
        - heading "Worship Nights" [level=3] [ref=f4e117]
        - paragraph [ref=f4e118]: Simple evenings of music, silence, and prayer. A chance to slow down and let the weight of the week fall off for a while.
      - generic [ref=f4e119]:
        - heading "Prayer Gatherings" [level=3] [ref=f4e123]
        - paragraph [ref=f4e124]: Lifting up our neighbors, our city, and one another. Sometimes it’s structured. Sometimes it’s just a few people sitting in silence together.
      - generic [ref=f4e125]:
        - heading "Recovery Support" [level=3] [ref=f4e132]
        - paragraph [ref=f4e133]: Confidential spaces for people navigating recovery. Everyone deserves a place to heal without judgment.
      - generic [ref=f4e134]:
        - heading "Community Meals" [level=3] [ref=f4e138]
        - paragraph [ref=f4e139]: Regular shared dinners where anyone can pull up a chair. Breaking bread together has a way of turning strangers into people you know.
      - generic [ref=f4e140]:
        - heading "Food Pantry" [level=3] [ref=f4e145]
        - paragraph [ref=f4e146]: Practical help for neighbors who need it. No forms, no income checks, no questions. Just food and a warm welcome.
  - generic [ref=f4e149]:
    - generic [ref=f4e150]:
      - generic [ref=f4e151]: Why Café Revival
      - heading "The café is the setting. Revival is the prayer." [level=2] [ref=f4e152]
      - paragraph [ref=f4e153]: Café Revival is a starting point, not a destination. We hope God uses this space to strengthen churches, launch new ministries, restore families, and bring hope to people who feel far from Him.
      - paragraph [ref=f4e154]: We dream of a place where the line between sacred and everyday blurs. Where conversations over coffee lead to changed lives. Where the presence of Jesus feels as natural as the smell of fresh espresso.
      - generic [ref=f4e155]: “Unless the Lord builds the house, those who build it labor in vain.” — Psalm 127:1
      - paragraph [ref=f4e156]: We show up. We brew good coffee. We love our neighbors. And we trust God with the rest.
    - generic [ref=f4e157]: Revival
