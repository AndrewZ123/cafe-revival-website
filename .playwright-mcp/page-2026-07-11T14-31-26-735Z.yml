  - generic [ref=f4e23]:
    - generic [ref=f4e24]:
      - generic [ref=f4e25]: Our Story
      - heading "It started with a simple thought." [level=2] [ref=f4e26]
      - paragraph [ref=f4e27]: "We kept noticing the same thing: the best conversations—the real ones—happened over coffee. Not in a meeting room, not in a church hall. At a small table with a warm cup in hand and nowhere to rush off to."
      - paragraph [ref=f4e28]: Coffee shops have a way of slowing people down. You sit. You talk. Things come up that might not otherwise. That kind of space felt worth building.
      - paragraph [ref=f4e29]: So we started dreaming about a café where the coffee is excellent and faith is woven through everything—not loud, not hidden, just present. A place that feels good to walk into, whether you’re coming alone, meeting a friend, or just need somewhere to sit and think.
      - paragraph [ref=f4e30]: The café is the setting. Revival is the prayer.
      - link "Our Vision" [ref=f4e31] [cursor=pointer]:
        - /url: "#vision"
    - img "Two people laughing together over coffee at a small table" [ref=f4e34]
  - generic [ref=f4e36]:
    - generic [ref=f4e37]:
      - generic [ref=f4e38]: Our Vision
      - heading "More than a coffee shop." [level=2] [ref=f4e39]
      - paragraph [ref=f4e40]: A place where faith and everyday life don’t feel like separate things. A hub for connection, ministry, and community.
    - generic [ref=f4e41]:
      - generic [ref=f4e42]:
        - heading "Christ-Centered Gathering Place" [level=3] [ref=f4e49]
        - paragraph [ref=f4e50]: Bible studies, worship nights, prayer groups—happening throughout the week. These are part of what we do, like pulling shots and steaming milk.
      - generic [ref=f4e51]:
        - heading "Rooted in the Neighborhood" [level=3] [ref=f4e55]
        - paragraph [ref=f4e56]: Food distributions, recovery groups, community meals, thrift outreach. We’re here for the neighborhood, not just the customers who walk in.
      - generic [ref=f4e57]:
        - heading "Humble & Dependent" [level=3] [ref=f4e61]
        - paragraph [ref=f4e62]: Revival can’t be manufactured. We show up, we make space, and we trust God with whatever comes next.
  - generic [ref=f4e64]:
    - generic [ref=f4e65]:
      - generic [ref=f4e66]: What Makes Us Different
      - heading "Great coffee and real purpose belong in the same room." [level=2] [ref=f4e67]
      - paragraph [ref=f4e68]: Here’s what that looks like.
    - generic [ref=f4e69]:
      - generic [ref=f4e70]:
        - heading "Really Good Coffee" [level=3] [ref=f4e75]
        - paragraph [ref=f4e76]: We spent months finding the right roaster. Every shot is dialed in by hand. Good coffee isn’t an accident—and the people who walk through our doors deserve the real thing.
      - generic [ref=f4e77]:
        - heading "Real Community" [level=3] [ref=f4e82]
        - paragraph [ref=f4e83]: Walk in enough times and someone will know your name. And your order. And might actually ask how your week was. That’s the kind of place we’re building.
      - generic [ref=f4e84]:
        - heading "Faith Without Pressure" [level=3] [ref=f4e88]
        - paragraph [ref=f4e89]: Our faith in Jesus shapes everything about this café—the way we serve, the way we treat people, the way we work. But there’s nothing you need to sign or say to walk through the door.
  - generic [ref=f4e90]:
    - text: "\""
    - generic [ref=f4e92]:
      - generic [ref=f4e93]: Our Mission
      - heading "Why we exist" [level=2] [ref=f4e94]
      - paragraph [ref=f4e95]: To glorify God by creating a welcoming community café where authentic relationships provide opportunities to share the hope of Jesus, strengthen those who follow Him, and serve our neighbors with genuine hospitality.
      - paragraph [ref=f4e96]: — Rooted in faith. Grounded in love. Open to all.
